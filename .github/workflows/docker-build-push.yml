---

name: Create and publish a Docker image

on:
  workflow_dispatch: {}
  push:
    branches: ['main']

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.filter.outputs.base }}
      backstopjs: ${{ steps.filter.outputs.backstopjs }}
      pa11y: ${{ steps.filter.outputs.pa11y }}
      unlighthouse: ${{ steps.filter.outputs.unlighthouse }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'Dockerfile'
            backstopjs:
              - 'Dockerfile.backstopjs'
              - 'versions.backstopjs.json'
            pa11y:
              - 'Dockerfile.pa11y'
              - 'versions.pa11y.json'
            unlighthouse:
              - 'Dockerfile.unlighthouse'
              - 'versions.unlighthouse.json'

  setup:
    runs-on: ubuntu-latest
    outputs:
      backstopjs_matrix: ${{ steps.read.outputs.backstopjs }}
      unlighthouse_matrix: ${{ steps.read.outputs.unlighthouse }}
      pa11y_matrix: ${{ steps.read.outputs.pa11y }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read versions
        id: read
        run: |
          backstopjs=$(jq -c '{include: [.versions[] as $v | {version: $v, is_latest: ($v == .latest)}]}' versions.backstopjs.json)
          unlighthouse=$(jq -c '{include: [.versions[] as $v | {version: $v, is_latest: ($v == .latest)}]}' versions.unlighthouse.json)
          pa11y=$(jq -c '{include: [.versions[] as $v | {version: $v.pa11y, pa11y_ci: $v.pa11y_ci, is_latest: ($v.pa11y == .latest)}]}' versions.pa11y.json)
          echo "backstopjs=$backstopjs" >> $GITHUB_OUTPUT
          echo "unlighthouse=$unlighthouse" >> $GITHUB_OUTPUT
          echo "pa11y=$pa11y" >> $GITHUB_OUTPUT

  build-and-push-image__base:
    needs: changes
    if: needs.changes.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      IMAGE_NAME: 'metadrop/aljibe-tools'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # https://github.com/docker/login-action#about
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # https://github.com/docker/metadata-action#about
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Default entries
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            # Set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # https://github.com/docker/build-push-action#usage
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations/using-artifact-attestations-to-establish-provenance-for-builds
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-and-push-image__backstopjs:
    needs: [changes, setup, build-and-push-image__base]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.backstopjs == 'true' || needs.changes.outputs.base == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.backstopjs_matrix) }}
    env:
      IMAGE_NAME: 'metadrop/aljibe-tools/backstopjs'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # https://github.com/docker/login-action#about
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # https://github.com/docker/metadata-action#about
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=latest,enable=${{ matrix.is_latest == true }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # https://github.com/docker/build-push-action#usage
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backstopjs
          platforms: linux/amd64,linux/arm64
          build-args: |
            BACKSTOPJS_VERSION=${{ matrix.version }}
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations/using-artifact-attestations-to-establish-provenance-for-builds
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-and-push-image__pa11y:
    needs: [changes, setup, build-and-push-image__base]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.pa11y == 'true' || needs.changes.outputs.base == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.pa11y_matrix) }}
    env:
      IMAGE_NAME: 'metadrop/aljibe-tools/pa11y'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=latest,enable=${{ matrix.is_latest == true }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pa11y
          platforms: linux/amd64,linux/arm64
          build-args: |
            PA11Y_VERSION=${{ matrix.version }}
            PA11Y_CI_VERSION=${{ matrix.pa11y_ci }}
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-and-push-image__unlighthouse:
    needs: [changes, setup, build-and-push-image__base]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.changes.outputs.unlighthouse == 'true' || needs.changes.outputs.base == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.unlighthouse_matrix) }}
    env:
      IMAGE_NAME: 'metadrop/aljibe-tools/unlighthouse'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # https://github.com/docker/login-action#about
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # https://github.com/docker/metadata-action#about
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=latest,enable=${{ matrix.is_latest == true }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # https://github.com/docker/build-push-action#usage
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.unlighthouse
          platforms: linux/amd64,linux/arm64
          build-args: |
            UNLIGHTHOUSE_VERSION=${{ matrix.version }}
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations/using-artifact-attestations-to-establish-provenance-for-builds
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
